name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask boto3 pytest
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          cd app
          pytest tests/ -v

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test, terraform-plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Get EC2 instance ID
        id: get_instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=cloud-governance-app" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Deploying to: $INSTANCE_ID"

      - name: Upload app.py to S3 staging bucket
        run: |
          aws s3 cp app/app.py s3://${{ secrets.DEPLOY_BUCKET }}/app.py

      - name: Deploy app to EC2 via SSM
        run: |
          INSTANCE_ID="${{ steps.get_instance.outputs.instance_id }}"
          BUCKET="${{ secrets.DEPLOY_BUCKET }}"
          API_KEY="${{ secrets.API_KEY }}"

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy from GitHub Actions - ${{ github.sha }}" \
            --parameters "commands=[
              \"cd /app\",
              \"aws s3 cp s3://$BUCKET/app.py /app/app.py\",
              \"echo API_KEY=$API_KEY >> /app/.env\",
              \"pkill -f 'python3 app.py' || true\",
              \"sleep 1\",
              \"APP_MODE=aws API_KEY=$API_KEY nohup python3 /app/app.py > /var/log/app.log 2>&1 &\",
              \"sleep 2\",
              \"curl -sf http://localhost:5000/health && echo Deploy OK || echo Deploy FAILED\"
            ]" \
            --output text